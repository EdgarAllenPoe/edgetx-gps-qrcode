name: trigger-v10.10.8-from-issue

on:
  issues:
    types:
      - opened

permissions:
  actions: write
  issues: write
  contents: read

jobs:
  dispatch:
    if: github.event.issue.title == '[automation] run GPS QR v10.10.8 map-marker release'
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch implementation workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run implement-map-marker-v10.10.8.yml --ref master

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "The v10.10.8 implementation workflow was dispatched."
