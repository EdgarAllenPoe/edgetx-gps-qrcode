name: trigger-v10.10.8-target

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  actions: write
  pull-requests: write
  contents: read

jobs:
  dispatch:
    if: github.event.pull_request.title == '[automation] run GPS QR v10.10.8 map-marker release'
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch implementation workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run implement-map-marker-v10.10.8.yml --ref master

      - name: Close trigger pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr close "${{ github.event.pull_request.number }}" --comment "The v10.10.8 implementation workflow was dispatched from the trusted base branch."
